<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Atracción disponible!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        .content {
            padding: 30px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .attraction-name {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
            margin: 15px 0;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            margin: 20px 0;
            font-weight: 600;
        }
        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎢 TechPark UQ</h1>
            <p>¡Buena noticia!</p>
        </div>
        <div class="content">
            <div class="success-icon">🎉</div>
            <h2>¡Atracción disponible!</h2>
            <p>Hola <strong th:text="${nombre}">Usuario</strong>,</p>
            <div class="attraction-name" th:text="${atraccionNombre}">Atracción</div>
            <p>Ya está disponible nuevamente después del mantenimiento.</p>
            <p>¡No esperes más y disfruta de esta emocionante experiencia!</p>
            
            <div style="text-align: center;">
                <a th:href="${appUrl} + '/visitante/mapa'" class="btn">🗺️ Ver en el mapa</a>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 TechPark UQ - Parque de Atracciones Inteligente</p>
        </div>
    </div>
</body>
</html>
