<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualización de tu cola</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #ff6b35 0%, #ff9a44 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
        }
        .content {
            padding: 30px;
        }
        .info-box {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .position-number {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b35;
        }
        .wait-time {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35 0%, #ff9a44 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            margin: 20px 0;
            font-weight: 600;
        }
        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .highlight {
            color: #ff6b35;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎢 TechPark UQ</h1>
            <p>Actualización de tu cola virtual</p>
        </div>
        <div class="content">
            <h2>Hola <span th:text="${nombre}">Usuario</span>,</h2>
            <p>Tu posición en la cola de <strong class="highlight" th:text="${atraccionNombre}">Atracción</strong> ha cambiado.</p>
            
            <div class="info-box">
                <p>Tu posición actual es:</p>
                <div class="position-number" th:text="${posicion}">1</div>
                <p>Tiempo estimado de espera:</p>
                <div class="wait-time" th:text="${tiempoEstimado} + ' minutos'">5 minutos</div>
            </div>
            
            <p style="text-align: center;">Te notificaremos cuando sea tu turno.</p>
            
            <div style="text-align: center;">
                <a th:href="${appUrl} + '/visitante/colas'" class="btn">🎟️ Ver mi estado</a>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 TechPark UQ - Parque de Atracciones Inteligente</p>
        </div>
    </div>
</body>
</html>
